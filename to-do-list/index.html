<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">To-Do List</h1>

    <div class="container">
        <div class="card">
            <h1>To-Do List</h1>
            <input type="text" id="new-to-do-input" placeholder="Enter Your To-Do">
            <button id="add-to-do-btn">Add</button>
            <ul id="to-do-list"></ul>  
        </div>  
    </div>

    <script src="script.js"></script>
    
</body>
</html>
