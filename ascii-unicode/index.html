<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII/Unicode Character Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="title">ASCII/Unicode Character Detector</h1>
  <div class="container">
    <div class="card">
      <h1>ASCII/Unicode Character Detector</h1>
      <input class="input" type="text" placeholder="Enter a character" id="character-input" maxlength="1">
      <button class="button" onclick="detectCharacter()">Detect</button>
      <p id="result">Result</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
